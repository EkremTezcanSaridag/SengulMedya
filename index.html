<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şengül Medya</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <link rel="icon" href="images/favicon.png">
</head>

<body>

    <header>

        <div class="logo">
            <!--firma logomuz buraya-->
            <img src="images/logos1.png" alt="Şengül Medya" id="logo">
        </div>

        <nav>
            <ul class="navlist">
                <li><a href="#"><i class="fa-solid fa-house "></i>Anasayfa</a></li>
                <li><a href="#"><i class="fa-solid fa-user "></i>Hizmetlerimiz</a></li>
                <li><a href="#"><i class="fa-solid fa-phone "></i>İletişim</a></li>
                <li><a href="#"><i class="fa-solid fa-address-book "></i>Hakkımızda</a></li>
            </ul>
        </nav>

    </header>



    <main>

        <section class="slider">

            <img src="images/anasayfafoto.jpg" alt="düğün fotosu" class="slider_img">

            <div class="arrows">
                <i class="fa-solid fa-chevron-left left"></i>
                <i class="fa-solid fa-chevron-right right"></i>
            </div>


            <div class="slider-text">
                <h1>KADRAJINDA YAŞAMA BUYUK</h1>
                <p>Profesyonel fotoğrafçılık ve videografi hizmetlerimizle anılarınızı ölümsüzleştirin.</p>
                <button class="btn">Hizmetlerimizi Keşfedin</button>
            </div>

        </section>


    </main>




    <script src="js/app.js"></script>

</body>


</html>
